<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chat™</title>
    <link href="style.css" rel="stylesheet">
    <script defer src="app.js" type="module"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.8.1/socket.io.min.js" integrity="sha512-8ExARjWWkIllMlNzVg7JKq9RKWPlJABQUNq6YvAjE/HobctjH/NA+bSiDMDvouBVjp4Wwnf1VP1OEv7Zgjtuxw==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <meta property="og:url" content="https://chat.emmameowss.gay/">
    <meta property="og:type" content="website">
    <meta property="og:title" content="chat™">
    <meta property="og:description" content="the very simple bare minimum chat app">
    <meta name="theme-color" content="#F5A9B8">
</head>
<body style="padding-top: 50px;">
    <!-- <div id="banner" style="position: fixed; top: 0; left: 0; width: 100%; background: darkred; color: white; text-align: center; padding: 7px; font-weight: bold; z-index: 9999;">image sending may be slow, implementation is the most simple/basic that's probably the reason why</div> -->
    <h1>chat™</h1>
    <p id="usercount" style="display:flex; margin: 20px auto 25px auto;">x users online</p>
    <!-- <p id="notice" style="display:flex; margin: 10px auto 25px auto; color:lightcoral;">image sending may be slow, implementation is the most simple/basic that's probably the reason why</p> -->
    <form id="username-form" style="display: flex; margin-bottom: 25px;">
        <input type="text" id="username-input" placeholder="set a username" maxlength="20">
        <button>set</button>
    </form>
    <form id="message-form">
        <input type="file" accept=".jpg, .jpeg, .png, .gif, .webp, .svg" id="file-input">
        <input type="text" id="message-input" autocomplete="off" placeholder="Message">
        <button>Send</button>
    </form>
    <p id="upload-error" style="color: pink; font-style: italic; display: none; text-align:center;"></p>
    <p id="upload-status" style="font-style: italic; display: none; text-align: center;"></p>
    <p id="typing-indicator" style="color:gray; font-style:italic; min-height:1em;"></p>
    <ul></ul>
</body>
</html>
