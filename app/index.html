<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chat™</title>
    <link href="style.css" rel="stylesheet">
    <script defer src="app.js" type="module"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.8.1/socket.io.min.js" integrity="sha512-8ExARjWWkIllMlNzVg7JKq9RKWPlJABQUNq6YvAjE/HobctjH/NA+bSiDMDvouBVjp4Wwnf1VP1OEv7Zgjtuxw==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <meta property="og:url" content="https://chat.emmameowss.gay/">
    <meta property="og:type" content="website">
    <meta property="og:title" content="chat™">
    <meta property="og:description" content="the very simple bare minimum chat app">
    <meta name="theme-color" content="#F5A9B8">
</head>
<body>
    <h1>chat™</h1>
    <form id="username-form">
        <input type="text" id="username-input" placeholder="set a username" maxlength="20">
        <button type="submit">set</button>
        <button type="button" id="signout">log out</button>
    </form>
    <div id="userlist"></div>
    <form id="message-form">
        <input type="file" accept=".jpg,.jpeg,.png,.gif,.webp,.svg" id="file-input">
        <input type="text" id="message-input" autocomplete="off" placeholder="message">
        <button type="submit">send</button>
    </form>
    <p id="upload-error"></p>
    <p id="upload-status"></p>
    <p id="typing-indicator"></p>
    <ul></ul>
</body>
</html>
