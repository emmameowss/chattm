<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>chat™</title>
    <link href="style.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <script defer src="app.js" type="module"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.8.1/socket.io.min.js" integrity="sha512-8ExARjWWkIllMlNzVg7JKq9RKWPlJABQUNq6YvAjE/HobctjH/NA+bSiDMDvouBVjp4Wwnf1VP1OEv7Zgjtuxw==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <meta property="og:url" content="https://chat.emmameowss.gay/">
    <meta property="og:type" content="website">
    <meta property="og:title" content="chat™">
    <meta property="og:description" content="the chat app">
    <meta name="theme-color" content="#F5A9B8">
</head>
<body>
    <h1>chat™</h1>
    <form id="username-form">
        <button type="button" id="profile-btn"></button>
        <div class="divider"></div>
        <button type="button" id="more-btn"><i class="ti ti-dots-vertical"></i></button>
        <div id="more-menu">
           <button type="button" title="mute notification sound" id="mute-btn"><span class="mute-label">mute sound</span></button>
           <button type="button" id="theme-btn"><i class="ti ti-sun"></i> light mode</button>
           <button type="button" id="compact-btn"><i class="ti ti-layout-list"></i> compact mode</button>
           <button type="button" id="tooltips-btn"><i class="ti ti-info-circle"></i> hide tooltips</button>
           <!-- <button type="button" id="email-btn" title="email me" onclick="window.location.href='mailto:emma@csarcade.wiki'"><i class="ti ti-mail-forward"></i> email me</button> -->
            <div class="menu-divider"></div>
           <a href="/privacy" target="_blank"><button type="button"><i class="ti ti-shield"></i> privacy</button></a>
           <!-- <a href="https://status.emmameowss.gay" target="_blank"><button type="button"><i class="ti ti-progress-check"></i> status</button></a> -->
           <button type="button" id="signout"><i class="ti ti-logout"></i> sign out</button>
           <div id="version-status"></div>
           <div class="menu-divider" id="owner-divider" style="display:none"></div>
            <div id="owner-tools" style="display:none">
                <button type="button" id="owner-mutechat-btn"><i class="ti ti-microphone-off"></i> toggle chat mute</button>
                <button type="button" id="owner-maintenance-btn"><i class="ti ti-tool"></i> toggle maintenance</button>
                <button type="button" id="owner-clear-btn"><i class="ti ti-trash"></i> clear chat</button>
                <button type="button" id="owner-refresh-version-btn"><i class="ti ti-refresh"></i> refresh version status</button>
            </div>
        </div>
    </form>
    <div id="profile-backdrop" style="display:none"></div>
    <input type="file" id="avatar-input" accept="image/*" style="display:none">
    <div id="profile-panel" style="display:none">
        <button type="button" id="profile-close">&times;</button>
        <div id="profile-avatar-wrap"></div>
        <div id="profile-name-row"></div>
        <div id="profile-status-display"></div>
        <div id="profile-bio-display"></div>
        <div id="profile-edit" style="display:none">
            <label class="profile-field-label">username</label>
            <input id="profile-username-input" maxlength="20" placeholder="username" autocomplete="off">
            <label class="profile-field-label">bio</label>
            <textarea id="profile-bio-input" maxlength="300" placeholder="bio (optional)"></textarea>
        </div>
        <div id="profile-actions">
            <button type="button" id="profile-edit-btn" style="display:none"><i class="ti ti-pencil"></i> edit profile</button>
            <div id="profile-edit-actions" style="display:none">
                <button type="button" id="profile-cancel-btn">cancel</button>
                <button type="button" id="profile-save-btn">save</button>
            </div>
        </div>
    </div>
    <div id="userlist"></div>
    <div id="bottom-hints">
      <p id="command-suggestion" style="display:none;"></p>
      <p id="typing-indicator"></p>
    </div>
    <div id="emoji-picker" style="display:none"></div>
    <form id="message-form">
        <input type="file" accept=".jpg,.jpeg,.png,.gif,.webp,.svg,.mp4,.mov,.mp3,.ogg,.wav,.pdf,.txt,.md,.zip,.rar,.7z,.tar,.gz,.json,.csv,.psd,.fig" id="file-input" style="display:none">
        <button type="button" id="attach-btn"><i class="ti ti-paperclip"></i></button>
        <button type="button" id="emoji-btn"><i class="ti ti-mood-smile"></i></button>
        <input type="text" id="message-input" autocomplete="off" placeholder="message">
        <button type="submit"><i class="ti ti-send-2"></i></button>
    </form>
    <p id="upload-error"></p>
    <p id="upload-status"></p>
    <div id="modal-overlay" style="display:none">
  <div id="modal-box">
    <p id="modal-message"></p>
    <input type="text" id="modal-input" style="display:none">
    <div id="modal-actions">
      <button type="button" id="modal-cancel">cancel</button>
      <button type="button" id="modal-confirm">confirm</button>
    </div>
  </div>
</div>
    <div id="message-context-menu">
       <button type="button" id="ctx-delete-btn"><i class="ti ti-trash"></i> delete message</button>
    </div>
    <ul></ul>
</body>
</html>
