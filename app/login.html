<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />
        <title>chat™</title>
        <link href="style.css" rel="stylesheet" />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"
        />
        <meta name="theme-color" content="#F5A9B8" />
        <script
            async
            crossorigin="anonymous"
            data-clerk-publishable-key="pk_test_dGhhbmtmdWwtZWVsLTc0LmNsZXJrLmFjY291bnRzLmRldiQ"
            src="https://thankful-eel-74.clerk.accounts.dev/npm/@clerk/clerk-js@5/dist/clerk.browser.js"
            type="text/javascript"
        ></script>
    </head>
    <body class="login-page">
        <h1>chat™</h1>
        <p>you need to sign in to chat</p>

        <!-- Clerk mounts its sign-in / sign-up UI here -->
        <div id="clerk-signin" style="width: 100%; max-width: 400px"></div>
        <p
            id="clerk-error"
            style="
                display: none;
                color: var(--pink);
                margin: 0;
                font-size: 0.85em;
            "
        ></p>

        <!--GUEST_SECTION-->
        <!--MESSAGES-->

        <script>
            (function () {
                const h = location.hostname;
                if (
                    ["beta.chattm.app", "localhost", "127.0.0.1"].includes(h)
                ) {
                    const b = document.createElement("div");
                    b.id = "dev-banner";
                    b.textContent =
                        h === "beta.chattm.app"
                            ? "this is a beta instance of chat™ - things may not be very stable"
                            : "this is a dev instance of chat™ - things may not be stable and may break often";
                    document.body.appendChild(b);
                }

                const clerkError = document.getElementById("clerk-error");
                function showClerkError(msg) {
                    clerkError.textContent = msg;
                    clerkError.style.display = "block";
                }

                // ── Clerk sign-in ──
                // Once Clerk loads, either the user is already signed in (in
                // which case we exchange their Clerk session for one of our own
                // app sessions), or we mount Clerk's sign-in UI.
                async function exchangeClerkSession() {
                    try {
                        const token = await window.Clerk.session.getToken();
                        const res = await fetch("/clerk-login", {
                            method: "POST",
                            headers: { "content-type": "application/json" },
                            body: JSON.stringify({ token }),
                        });
                        const data = await res.json().catch(() => ({}));
                        if (!res.ok) {
                            showClerkError(
                                data.error || "could not sign you in",
                            );
                            return;
                        }
                        localStorage.setItem("session", data.session);
                        window.location.href = "/";
                    } catch (e) {
                        showClerkError("network error, try again");
                    }
                }

                window.addEventListener("load", async function () {
                    if (!window.Clerk) {
                        showClerkError("couldn't load sign-in, please refresh");
                        return;
                    }
                    await window.Clerk.load();
                    const params = new URLSearchParams(location.search);
                    // came from /signout → end the Clerk session too, then reload
                    if (params.get("signedout") && window.Clerk.user) {
                        await window.Clerk.signOut({ redirectUrl: "/" });
                        return;
                    }
                    if (window.Clerk.user && window.Clerk.session) {
                        exchangeClerkSession();
                    } else {
                        window.Clerk.mountSignIn(
                            document.getElementById("clerk-signin"),
                            {
                                fallbackRedirectUrl: "/",
                                signUpFallbackRedirectUrl: "/",
                            },
                        );
                    }
                });

                // ── guest form (absent when guests are disabled) ──
                const guestBtn = document.getElementById("guest-btn");
                if (guestBtn) {
                    const guestForm =
                        document.getElementById("guest-name-form");
                    const guestInput =
                        document.getElementById("guest-name-input");
                    const guestError =
                        document.getElementById("guest-name-error");
                    function openGuestForm() {
                        guestBtn.style.display = "none";
                        guestForm.style.display = "flex";
                        guestInput.focus();
                    }
                    function closeGuestForm() {
                        guestForm.style.display = "none";
                        guestInput.value = "";
                        guestError.style.display = "none";
                        guestBtn.style.display = "";
                    }
                    guestBtn.addEventListener("click", openGuestForm);
                    function submitGuestName() {
                        const name = guestInput.value.trim();
                        if (!name || !/^[a-zA-Z0-9-]{1,20}$/.test(name)) {
                            guestError.textContent = name
                                ? "username can only contain letters, numbers, and hyphens (max 20 chars)"
                                : "please enter a username";
                            guestError.style.display = "block";
                            guestInput.focus();
                            return;
                        }
                        guestError.style.display = "none";
                        window.location.href =
                            "/guest?username=" + encodeURIComponent(name);
                    }
                    document
                        .getElementById("guest-name-submit")
                        .addEventListener("click", submitGuestName);
                    document
                        .getElementById("guest-name-cancel")
                        .addEventListener("click", closeGuestForm);
                    guestInput.addEventListener("keydown", (e) => {
                        if (e.key === "Enter") submitGuestName();
                        if (e.key === "Escape") closeGuestForm();
                    });
                }
            })();
        </script>
    </body>
</html>
